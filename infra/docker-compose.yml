services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ether
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6378:6379"

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://user:pass@db:5432/ether"
      REDIS_URL: "redis://redis:6379"
      SECRET_KEY: "change-me-in-production"
      ALLOWED_ORIGINS: '["*"]'
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: